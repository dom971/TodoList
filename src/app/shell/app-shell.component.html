<main class="app-page">
  <section class="app-shell" aria-label="Espace personnel">
    <aside class="app-sidebar" aria-label="Navigation">
      <div>
        <p class="eyebrow">Personal Hub</p>
        <h1>Workspace</h1>
      </div>

      <nav class="app-nav">
        <a routerLink="/app/dashboard" routerLinkActive="is-active">Dashboard</a>
        <a routerLink="/app/todos" routerLinkActive="is-active">Tâches</a>
        <a routerLink="/app/notes" routerLinkActive="is-active">Notes</a>
        <a routerLink="/app/photos" routerLinkActive="is-active">Photos</a>
        <a routerLink="/app/search" routerLinkActive="is-active">Recherche</a>
        <a routerLink="/app/scanner" routerLinkActive="is-active">Scanner</a>
        <a routerLink="/app/coming-soon" routerLinkActive="is-active">À venir</a>
      </nav>

      <section class="account-summary" aria-label="Compte">
        <div>
          <span>Compte</span>
          <strong>{{ userEmail() }}</strong>
        </div>
        <div>
          <span>Identifiant</span>
          <strong>{{ userId().slice(0, 8) }}...</strong>
        </div>
      </section>

      <section class="theme-switcher" aria-label="Thème">
        <span>Thème</span>
        <div>
          <button
            type="button"
            [class.is-active]="theme.theme() === 'light'"
            (click)="theme.setTheme('light')"
          >
            Clair
          </button>
          <button
            type="button"
            [class.is-active]="theme.theme() === 'dark'"
            (click)="theme.setTheme('dark')"
          >
            Sombre
          </button>
        </div>
      </section>

      <button class="sign-out-button" type="button" (click)="signOut()">
        Déconnexion
      </button>
    </aside>

    <section class="app-content">
      <router-outlet />
    </section>
  </section>
</main>
