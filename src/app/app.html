<main class="app-page">
  @if (auth.isLoading()) {
    <section class="app-shell auth-shell" aria-label="Chargement">
      <p class="eyebrow">Todo List</p>
      <h1>Chargement</h1>
      <p class="muted-text">Verification de la session en cours.</p>
    </section>
  } @else if (!auth.session()) {
    <section class="app-shell auth-shell" aria-labelledby="auth-title">
      <app-auth-panel />
    </section>
  } @else {
    <section class="app-shell" aria-labelledby="todo-title">
      <app-todo-board />
    </section>
  }
</main>
